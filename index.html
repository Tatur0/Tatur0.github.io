<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</head>

<body>
    <header class="text-center">
        <h1>Bloodborne</h1>
        <h2>FromSoftware/Sony</h2>
    </header>
    <main>
        <div>
            <div class="main-container container-fluid">
                <div class="shadow"></div>

                <!-- https://getbootstrap.com/docs/5.0/components/card/ -->
                <!-- Card -->
                <div class="row justify-content-center">
                    <div class="card col-xs-5 col-lg-6 col-md-6">
                        <div class="card-body">
                            <h5 class="card-title">Title</h5>
                            <p class="card-text">text</p>
                        </div>
                    </div>
                </div>

                <!-- Card -->
                <div class="row justify-content-center">
                    <div class="card col-xs-10 col-lg-6 col-md-6">
                        <div class="card-body">
                            <h5 class="card-title">Title</h5>
                            <p class="card-text">text</p>
                        </div>
                    </div>
                </div>

                <!-- Card -->
                <div class="row justify-content-center">
                    <div class="card col-sm-10 col-lg-6 col-md-6">
                        <div class="card-body">
                            <h5 class="card-title">Title</h5>
                            <p class="card-text">text</p>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>

        <!-- Carousel -->
        <div id="demo" class="carousel slide" data-bs-ride="carousel">

            <!-- Indicators/dots -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
            </div>

            <!-- The slideshow/carousel -->
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/2.webp" alt="" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="assets/3.jpg" alt="" class="d-block w-100">
                </div>
                <div class="carousel-item">
                    <img src="assets/4.webp" alt="" class="d-block w-100">
                </div>
            </div>

            <!-- Left and right controls/icons -->
            <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </main>
    <footer>

    </footer>
</body>
<link rel="stylesheet" href="style.css">
</html>
